<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Man</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    
    <link rel="stylesheet" href="./style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">

        <i class="bi bi-strava text-white me-2"></i>

        <a class="navbar-brand fw-bold" href="#">Iron Man</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Features</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>
            </ul>

            <form class="d-flex">
                <input class="form-control me-2" type="search" placeholder="Search">
                <button class="btn btn-dark" type="submit">Search</button>
            </form>

        </div>
    </div>
</nav>


<section>
    <div id="carouselExampleControls" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="./img/01.jpg" class="carousel-img d-block w-100" alt="">
            </div>

            <div class="carousel-item">
                <img src="./img/02.jpg" class="carousel-img d-block w-100" alt="">
            </div>

            <div class="carousel-item">
                <img src="./img/03.jpg" class="carousel-img d-block w-100" alt="">
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
</section>


<section class="text-center my-5">
    <h1 class="fw-bold text-danger">The Iron Man</h1>
</section>


<section class="container mb-5">

    <div class="row row-cols-1 row-cols-md-2 g-4">

        <div class="col">
            <div class="card shadow">
                <img src="./img/c1.jpg" class="card-img-top card-img" alt="">
                <div class="card-body">
                    <h5 class="card-title">Iron Suit</h5>
                    <p class="card-text">
                        Tony Stark's powerful advanced armor system.
                    </p>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card shadow">
                <img src="./img/c2.jpg" class="card-img-top card-img" alt="">
                <div class="card-body">
                    <h5 class="card-title">Arc Reactor</h5>
                    <p class="card-text">
                        The energy source powering Iron Man technology.
                    </p>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card shadow">
                <img src="./img/c3.jpg" class="card-img-top card-img" alt="">
                <div class="card-body">
                    <h5 class="card-title">Jarvis AI</h5>
                    <p class="card-text">
                        Intelligent AI assistant created by Tony Stark.
                    </p>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card shadow">
                <img src="./img/c4.jpg" class="card-img-top card-img" alt="">
                <div class="card-body">
                    <h5 class="card-title">Avengers</h5>
                    <p class="card-text">
                        Iron Man fighting alongside the Avengers team.
                    </p>
                </div>
            </div>
        </div>

    </div>

</section>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
